name: QuickShow
options:
  bundleIdPrefix: com.zolat
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.zolat.QuickShow
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  QuickShow:
    type: application
    platform: macOS
    sources:
      - path: QuickShow/Sources
    info:
      path: QuickShow/Info.plist
      properties:
        CFBundleName: QuickShow
        CFBundleDisplayName: QuickShow
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSHumanReadableCopyright: "Copyright © 2026 Thomas Zola."
    settings:
      base:
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: QuickShow/Info.plist
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
    postCompileScripts:
      - name: Build mcp-quick-show sidecar (bun)
        script: |
          "${SRCROOT}/tools/build-sidecar.sh"
        showEnvVarsInLog: false
