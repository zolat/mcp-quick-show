name: QuickShow
options:
  bundleIdPrefix: com.zolat
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  MCP:
    url: https://github.com/modelcontextprotocol/swift-sdk
    exactVersion: "0.12.1"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.zolat.QuickShow
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
    # Sign with the local Apple Development cert so the cdhash stays
    # stable across rebuilds — TCC keys on the cert identity, not the
    # bare cdhash, so a granted Screen Recording permission survives.
    # Manual + SHA1 avoids Xcode's macOS-automatic mode insisting on
    # the legacy "Mac Development" name.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "D71097FF3A5CE6C04169B56B44890AFD3707523D"
    DEVELOPMENT_TEAM: 7W38DP55GB
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  QuickShow:
    type: application
    platform: macOS
    sources:
      - path: QuickShow/Sources
    dependencies:
      - package: MCP
        product: MCP
    info:
      path: QuickShow/Info.plist
      properties:
        CFBundleName: QuickShow
        CFBundleDisplayName: QuickShow
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSHumanReadableCopyright: "Copyright © 2026 Thomas Zola."
        NSScreenCaptureUsageDescription: "QuickShow captures the screen region you select so you can mark it up and share it with your agent."
    settings:
      base:
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: QuickShow/Info.plist
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
    postCompileScripts:
      - name: Copy QuickShow resources (templates, libs)
        script: |
          "${SRCROOT}/tools/copy-resources.sh"
        showEnvVarsInLog: false
