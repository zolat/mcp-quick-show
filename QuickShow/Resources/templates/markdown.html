<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!--
  CSP: 'self' (the baseless inline document) + 'unsafe-inline' for
  bundled inline scripts/styles. connect-src 'none' blocks exfil.
  img-src allows file:/data: for local images and inline data URIs.
  All libs and the theme are injected as inline content by Swift at
  template-load time, so we don't need any relative-URL fetches —
  WKWebView's default file:// cross-origin policy doesn't let
  baseURL-relative <script src> work anyway.
-->
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; connect-src 'none'; img-src 'self' file: data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
<!--QS_THEME-->
<style>
  body {
    padding: 20px 24px;
    box-sizing: border-box;
    max-width: 760px;
    margin: 0 auto;
  }
  #qs-content h1, #qs-content h2, #qs-content h3, #qs-content h4 {
    line-height: 1.25;
    margin-top: 1.4em;
    margin-bottom: 0.5em;
  }
  #qs-content h1 { font-size: 1.8em; border-bottom: 1px solid var(--border-muted); padding-bottom: 0.2em; }
  #qs-content h2 { font-size: 1.4em; border-bottom: 1px solid var(--border-muted); padding-bottom: 0.2em; }
  #qs-content h3 { font-size: 1.2em; }
  #qs-content p { margin: 0.7em 0; }
  #qs-content a { color: var(--link); text-decoration: none; }
  #qs-content a:hover { text-decoration: underline; }
  #qs-content code {
    background: var(--code-bg);
    color: var(--code-fg);
    padding: 0.15em 0.4em;
    border-radius: 3px;
    font-family: var(--mono-font);
    font-size: 0.9em;
  }
  #qs-content pre {
    background: var(--pre-bg);
    color: var(--pre-fg);
    padding: 12px 14px;
    border-radius: 6px;
    overflow-x: auto;
    font-family: var(--mono-font);
    font-size: 0.85em;
    line-height: 1.45;
  }
  #qs-content pre code {
    background: transparent;
    color: inherit;
    padding: 0;
    border-radius: 0;
    font-size: inherit;
  }
  #qs-content blockquote {
    margin: 0.7em 0;
    padding: 0 1em;
    border-left: 0.25em solid var(--border);
    color: var(--fg-muted);
  }
  #qs-content table { border-collapse: collapse; margin: 0.7em 0; }
  #qs-content th, #qs-content td {
    border: 1px solid var(--border);
    padding: 6px 12px;
  }
  #qs-content tr:nth-child(2n) { background: var(--table-row-alt); }
  #qs-content img { max-width: 100%; }
  #qs-content ul, #qs-content ol { padding-left: 1.6em; }
  #qs-content li { margin: 0.2em 0; }
  #qs-content hr {
    border: 0;
    border-top: 1px solid var(--border-muted);
    margin: 1.5em 0;
  }
  #qs-content kbd {
    background: var(--bg);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 2px 6px;
    font-family: var(--mono-font);
    font-size: 0.85em;
  }
  #qs-content details {
    margin: 0.7em 0;
    padding: 0.4em 0.6em;
    border: 1px solid var(--border-muted);
    border-radius: 6px;
  }
  #qs-content details summary {
    cursor: pointer;
    font-weight: 600;
  }
</style>
</head>
<body>
<div id="qs-content"></div>
<div id="qs-error"></div>
<!--QS_MARKED-->
<!--QS_PURIFY-->
<script>
(function() {
  "use strict";

  // marked configuration. gfm=true gets us tables, strikethrough,
  // task lists, fenced code. sanitization happens via DOMPurify on
  // the rendered HTML — marked's own sanitize option is deprecated.
  marked.use({ gfm: true, breaks: false });

  const purifyConfig = {
    // Preserve elements the PRD calls out specifically. DOMPurify's
    // default profile already drops <script> and dangerous attrs.
    ADD_TAGS: ['details', 'summary'],
    ALLOW_DATA_ATTR: false,
  };

  function measure() {
    const w = Math.ceil(document.documentElement.scrollWidth);
    const h = Math.ceil(document.documentElement.scrollHeight);
    return { width: w, height: h };
  }

  function showError(title, detail, line) {
    const ec = document.getElementById('qs-error');
    const c = document.getElementById('qs-content');
    c.style.display = 'none';
    ec.innerHTML = '';
    const titleEl = document.createElement('div');
    titleEl.className = 'qs-error-title';
    titleEl.textContent = title;
    ec.appendChild(titleEl);
    if (typeof line === 'number') {
      const ln = document.createElement('div');
      ln.className = 'qs-error-line';
      ln.textContent = 'line ' + line;
      ec.appendChild(ln);
    }
    const detailEl = document.createElement('div');
    detailEl.textContent = detail;
    ec.appendChild(detailEl);
    ec.classList.add('visible');
  }

  // Single bridge handler. The native side posts a payload to
  // window.__quickshow_render(body), we render it, and post back via
  // the `renderComplete` message handler.
  window.__quickshow_render = function(body) {
    try {
      const ec = document.getElementById('qs-error');
      const c = document.getElementById('qs-content');
      ec.classList.remove('visible');
      c.style.display = '';

      const rawHTML = marked.parse(body || '');
      const safe = DOMPurify.sanitize(rawHTML, purifyConfig);
      c.innerHTML = safe;

      const m = measure();
      window.webkit.messageHandlers.renderComplete.postMessage({
        ok: true, width: m.width, height: m.height
      });
    } catch (err) {
      const msg = (err && err.message) || String(err);
      showError('Render error', msg);
      const m = measure();
      window.webkit.messageHandlers.renderComplete.postMessage({
        ok: false, error: msg, width: m.width, height: m.height
      });
    }
  };

  // Display a render error coming from the native side (e.g. file
  // could not be read, MIME mismatch). Native posts via
  // window.__quickshow_error(title, detail, line).
  window.__quickshow_error = function(title, detail, line) {
    showError(title || 'Error', detail || '', typeof line === 'number' ? line : undefined);
    const m = measure();
    window.webkit.messageHandlers.renderComplete.postMessage({
      ok: false, error: detail || title, line: line, width: m.width, height: m.height
    });
  };

  // Tell native we're ready — initial blank state.
  document.addEventListener('DOMContentLoaded', function() {
    window.webkit.messageHandlers.renderComplete.postMessage({
      ok: true, ready: true, width: 0, height: 0
    });
  });
})();
</script>
</body>
</html>
